# fly.toml app configuration file generated for personal-sns on 2026-05-18T12:45:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'personal-sns'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
